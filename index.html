<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accordion Slider</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0d0d14;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Geist',system-ui,sans-serif;
  gap:32px;
  padding:40px 20px;
}

h1{
  font-size:clamp(18px,2.5vw,28px);
  font-weight:500;
  color:rgba(255,255,255,.85);
  letter-spacing:-.02em;
}

.slider{
  display:flex;
  gap:12px;
  height:clamp(280px,45vw,520px);
  width:100%;
  max-width:1160px;
  align-items:stretch;
  user-select:none;
}

.panel{
  position:relative;
  overflow:hidden;
  border-radius:999px;
  cursor:pointer;
  flex:1;
  min-width:72px;
  transition:
    flex .65s cubic-bezier(.25,1,.5,1),
    border-radius .65s cubic-bezier(.25,1,.5,1),
    box-shadow .4s ease;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}

.panel.active{
  flex:8;
  border-radius:28px;
  box-shadow:0 16px 60px rgba(59,130,246,.3),0 8px 30px rgba(0,0,0,.6);
}

.panel img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
  transition:transform .65s cubic-bezier(.25,1,.5,1),filter .4s ease;
  filter:brightness(.75) saturate(.9);
  will-change:transform;
}

.panel.active img{
  filter:brightness(1) saturate(1.05);
  transform:scale(1.02);
}

.panel .border-ring{
  position:absolute;
  inset:0;
  border-radius:inherit;
  border:1.5px solid rgba(255,255,255,0);
  transition:border-color .4s ease;
  pointer-events:none;
  z-index:3;
}
.panel.active .border-ring{
  border-color:rgba(59,130,246,.55);
}

.panel .badge{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%) scale(.6);
  background:rgba(255,255,255,.95);
  border-radius:50%;
  width:44px;
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:4;
  opacity:0;
  transition:opacity .4s ease,transform .45s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 4px 14px rgba(0,0,0,.3);
  font-size:20px;
  backdrop-filter:blur(6px);
}
.panel.active .badge{
  opacity:1;
  transform:translateX(-50%) scale(1);
}

.panel .label{
  position:absolute;
  top:20px;
  left:22px;
  z-index:4;
  color:#fff;
  font-size:13px;
  font-weight:500;
  letter-spacing:.04em;
  text-transform:uppercase;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .4s .1s ease,transform .4s .1s ease;
  text-shadow:0 2px 8px rgba(0,0,0,.6);
  white-space:nowrap;
}
.panel.active .label{
  opacity:1;
  transform:translateY(0);
}

.panel .overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,transparent 40%,rgba(0,0,0,.45) 100%);
  z-index:2;
  opacity:0;
  transition:opacity .4s ease;
}
.panel.active .overlay{opacity:1}

.hint{
  font-size:12px;
  color:rgba(255,255,255,.3);
  letter-spacing:.06em;
  text-transform:uppercase;
}

@media(max-width:600px){
  .slider{height:220px;gap:7px}
  .panel{min-width:50px;border-radius:999px}
  .panel.active{border-radius:18px}
  .badge{width:34px;height:34px;font-size:15px;bottom:10px}
  .label{font-size:11px;top:12px;left:14px}
}
</style>
</head>
<body>

<h1>Hover to explore</h1>

<div class="slider" id="slider">

  <div class="panel" data-label="Cascades" data-icon="🌊">
    <img src="https://picsum.photos/id/137/1200/800" alt="Waterfall">
    <div class="overlay"></div>
    <div class="border-ring"></div>
    <span class="label">Cascades</span>
    <div class="badge">🌊</div>
  </div>

  <div class="panel" data-label="Highlands" data-icon="🏔">
    <img src="https://picsum.photos/id/29/1200/800" alt="Mountains">
    <div class="overlay"></div>
    <div class="border-ring"></div>
    <span class="label">Highlands</span>
    <div class="badge">🏔</div>
  </div>

  <div class="panel" data-label="Canopy" data-icon="🌿">
    <img src="https://picsum.photos/id/15/1200/800" alt="Forest">
    <div class="overlay"></div>
    <div class="border-ring"></div>
    <span class="label">Canopy</span>
    <div class="badge">🌿</div>
  </div>

  <div class="panel" data-label="Shoreline" data-icon="🏖">
    <img src="https://picsum.photos/id/96/1200/800" alt="Beach">
    <div class="overlay"></div>
    <div class="border-ring"></div>
    <span class="label">Shoreline</span>
    <div class="badge">🏖</div>
  </div>

  <div class="panel" data-label="Sundown" data-icon="🌅">
    <img src="https://picsum.photos/id/110/1200/800" alt="Sunset">
    <div class="overlay"></div>
    <div class="border-ring"></div>
    <span class="label">Sundown</span>
    <div class="badge">🌅</div>
  </div>

  <div class="panel" data-label="Structure" data-icon="🏛">
    <img src="https://picsum.photos/id/58/1200/800" alt="Architecture">
    <div class="overlay"></div>
    <div class="border-ring"></div>
    <span class="label">Structure</span>
    <div class="badge">🏛</div>
  </div>

</div>

<p class="hint">hover any panel</p>

<script>
(function(){
  var slider=document.getElementById('slider');
  var panels=Array.from(slider.querySelectorAll('.panel'));
  var ratios={};
  var activePanel=null;

  panels.forEach(function(panel,i){
    var img=panel.querySelector('img');
    img.addEventListener('load',function(){
      if(img.naturalWidth&&img.naturalHeight){
        ratios[i]=img.naturalWidth/img.naturalHeight;
      }
    });
    if(img.complete&&img.naturalWidth){
      ratios[i]=img.naturalWidth/img.naturalHeight;
    }
  });

  function activate(panel){
    if(panel===activePanel)return;
    activePanel=panel;
    var idx=panels.indexOf(panel);
    var ar=ratios[idx]||16/9;
    var h=slider.offsetHeight;
    var expandW=Math.round(h*ar);
    panels.forEach(function(p){
      if(p===panel){
        p.style.flex='none';
        p.style.width=expandW+'px';
        p.classList.add('active');
      }else{
        p.style.flex='1';
        p.style.width='';
        p.classList.remove('active');
      }
    });
  }

  function reset(){
    activePanel=null;
    panels.forEach(function(p){
      p.style.flex='1';
      p.style.width='';
      p.classList.remove('active');
    });
  }

  panels.forEach(function(panel){
    panel.addEventListener('mouseenter',function(){activate(panel);});
  });
  slider.addEventListener('mouseleave',reset);

  /* touch support */
  panels.forEach(function(panel){
    panel.addEventListener('click',function(){
      if(panel.classList.contains('active')){reset();}
      else{activate(panel);}
    });
  });
})();
</script>
</body>
</html>
